<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        .page-content { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-v9-content { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .form-row-total { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .form-row { flex: 1 1 45%; min-width: 220px; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .form-row-last { text-align: center; }
        .register { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; }
        .register:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="page-content">
        <div class="form-v9-content">
            <form class="form-detail" action="/predict" method="post">
                <h2>Please Fill The Information</h2>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="fixed_acidity">Fixed Acidity</label>
                        <input type="text" name="fixed_acidity" id="fixed_acidity" placeholder="fixed_acidity" required>
                    </div>
                    <div class="form-row">
                        <label for="volatile_acidity">Volatile Acidity</label>
                        <input type="text" name="volatile_acidity" id="volatile_acidity" placeholder="volatile_acidity" required>
                    </div>
                </div>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="citric_acid">Citric Acid</label>
                        <input type="text" name="citric_acid" id="citric_acid" placeholder="citric_acid" required>
                    </div>
                    <div class="form-row">
                        <label for="residual_sugar">Residual Sugar</label>
                        <input type="text" name="residual_sugar" id="residual_sugar" placeholder="residual_sugar" required>
                    </div>
                </div>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="chlorides">Chlorides</label>
                        <input type="text" name="chlorides" id="chlorides" placeholder="chlorides" required>
                    </div>
                    <div class="form-row">
                        <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
                        <input type="text" name="free_sulfur_dioxide" id="free_sulfur_dioxide" placeholder="free_sulfur_dioxide" required>
                    </div>
                </div>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
                        <input type="text" name="total_sulfur_dioxide" id="total_sulfur_dioxide" placeholder="total_sulfur_dioxide" required>
                    </div>
                    <div class="form-row">
                        <label for="density">Density</label>
                        <input type="text" name="density" id="density" placeholder="density" required>
                    </div>
                </div>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="pH">pH</label>
                        <input type="text" name="pH" id="pH" placeholder="pH" required>
                    </div>
                    <div class="form-row">
                        <label for="sulphates">Sulphates</label>
                        <input type="text" name="sulphates" id="sulphates" placeholder="sulphates" required>
                    </div>
                </div>
                <div class="form-row-total">
                    <div class="form-row">
                        <label for="alcohol">Alcohol</label>
                        <input type="text" name="alcohol" id="alcohol" placeholder="alcohol" required>
                    </div>
                </div>
                <div class="form-row-last">
                    <input type="submit" class="register" value="Predict">
                </div>
            </form>
        </div>
    </div>
